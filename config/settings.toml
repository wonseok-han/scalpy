[default]
# 시장 모드 ("kr": 국내주식, "us": 미국주식)
market = "kr"
# 모의투자 모드 (true: 모의투자, false: 실거래)
# 실거래 전환은 이 파일에서만 가능 (CLI 인자 불가)
mock = false
# PostgreSQL 연결 문자열 (docker-compose 기본값)
database_url = "postgresql://scalpy:scalpy@localhost:5432/scalpy"

[default.kis_api.ws_urls]
# KIS WebSocket 실시간 시세 URL
virtual = "ws://ops.koreainvestment.com:31000"
real = "ws://ops.koreainvestment.com:21000"

[default.kis_api.rest_urls]
# KIS REST API URL
virtual = "https://openapivts.koreainvestment.com:29443"
real = "https://openapi.koreainvestment.com:9443"

[default.simulator]
# MockBroker(KIS 키 미설정) 시 가상 시세 생성기 설정
# 틱 생성 간격 (초, 0.5 = 초당 2회)
interval = 0.5
# 가격 변동 폭 (0.002 = 0.2%, 높을수록 변동성 큼)
volatility = 0.01

[default.trading]
# 서버 시작 시 자동으로 트레이딩 시작 (false: 대시보드에서 수동 시작)
auto_start = false
# 자동매매 대상 종목코드 목록 (최대 20종목, WebSocket 구독 제한)
symbols = ["005930", "000660"]
# 종목당 최대 보유 수량
max_position_size = 100
# 종목당 최대 투입 비율 (0.3 = 잔고의 30%, 가격 × 수량이 이 비율 초과 시 수량 축소)
max_position_ratio = 0.5
# 동시 보유 최대 포지션 수 (초과 시 신규 매수 차단)
max_open_positions = 2
# 장 마감 시 자동 청산 (true: 스캘핑 기본, false: 퀀트 오버나이트 보유)
market_close_liquidate = false
# 손절 비율 (0.003 = 0.3%, 평균단가 대비 하락 시 자동 청산)
stop_loss_ratio = 0.02
# 익절 비율 (trailing stop 사용 시 비상 상한으로만 동작)
take_profit_ratio = 0.03
# Trailing Stop: 고점 추적 매도
# 활성화 기준 (0.01 = 1%, 매수가 대비 이 이상 수익 시 고점 추적 시작)
trailing_activate_ratio = 0.015
# 매도 기준 (0.01 = 1%, 고점 대비 이 이상 하락 시 매도)
trailing_stop_ratio = 0.005
# 수익 보호 스탑: trailing 활성화 전 본전 방어
# 활성화 기준 (0.005 = 0.5%, peak gain이 이 이상 도달한 적 있으면 보호 시작, 0 = 비활성화)
profit_protect_activate = 0.008
# 매도 기준 (0.002 = 0.2%, 현재 수익률이 이 이하로 떨어지면 매도)
profit_protect_ratio = 0.005
# 강제 청산 분할 매도 횟수 (1 = 전량 일괄, 3 = 3분할 매도, 슬리피지 방지)
force_close_splits = 3
# 횡보 청산: N시간 보유 후 수익률이 ±threshold 이내이면 자동 청산 (0 = 비활성화)
stagnation_hours = 3
# 횡보 판정 임계값 (0.005 = ±0.5% 이내이면 횡보로 판정)
stagnation_threshold = 0.005
# 최소 보유 시간 (초, 매수 후 이 시간 동안 전략 매도 차단, 손절/trailing 등 리스크 매도는 허용)
min_hold_seconds = 60
# 청산 후 재매수 대기 시간 (초, 같은 종목 청산 후 이 시간 동안 재매수 차단)
close_cooldown_seconds = 180

[default.quant]
# 퀀트 스크리닝 설정
max_stocks = 13
# 모멘텀 계산 기간 (일, 단기 퀀트 기준 10일)
momentum_days = 10
# 최소 평균 거래량 (10일 평균)
min_avg_volume = 500000
# 최소 모멘텀 (0.0 = 양수 모멘텀만, -0.1 = 10% 하락까지 허용)
min_momentum = 0
# 거래대금 상위 N종목만 OHLCV 분석 (전체 시장 1차 필터 후)
universe_size = 200
# 당일 등락률 하한 (-2.0 = -2%, 이하 급락 종목 universe에서 제외)
min_change_rate = -2.0
# 당일 등락률 상한 (10.0 = 10%, 초과 급등 종목 제외 — 차익실현 매물 위험)
max_change_rate = 10.0
# OHLCV 데이터 자동 갱신 간격 (분, 0 = 비활성화)
ohlcv_refresh_minutes = 30
# 퀀트 재스크리닝 주기 (분, 종목 교체 + WS 구독 갱신, 0 = 비활성화)
rescan_interval_minutes = 10
# 퀀트 스크리닝 대상 종목 유니버스 (빈 배열이면 기존 스크리닝 결과 활용)
universe = []

[default.dashboard]
# 웹 대시보드 활성화
enabled = true
host = "0.0.0.0"
port = 8080

[default.telegram]
# 텔레그램 알림 (봇 토큰은 .secrets.toml에 설정)
enabled = false
bot_token = ""
chat_id = ""

[default.strategies]
# 퀀트 활성 전략
# 사용 가능: momentum, mean_reversion, factor, ichimoku, volume_spike
quant_enabled = []

[default.strategies.momentum]
# 가격/거래량 관측 윈도우 (최근 N틱)
lookback = 20
# 거래량 급증 배수 (평균 대비 N배 이상이면 급증 판정)
volume_multiplier = 2
# 고점 돌파 비율 (0.005 = 0.5%, 최근 고점 대비 이 비율 이상 상승 시 진입)
breakout_pct = 0.01
cooldown_seconds = 300
# 단기 퀀트용 손절/익절 (1시간~1일 보유 기준)
stop_loss_ratio = 0.015
take_profit_ratio = 0.05

[default.strategies.mean_reversion]
# 볼린저밴드 관측 윈도우 (분봉 개수)
window = 30
# 표준편차 배수
num_std = 2.5
# 봉 집계 간격 (분, 3 = 3분봉 기준 볼린저밴드)
candle_minutes = 3
# 최소 체결량 (이하 틱 무시)
min_tick_volume = 5
cooldown_seconds = 600
# 장 초반 매수 유예 (실시간 캔들 N개 수집 전까지 BUY 차단, SELL은 허용)
open_grace_candles = 5
# 밴드 복귀 대기 시간 감안 넓은 손절/익절
stop_loss_ratio = 0.01
take_profit_ratio = 0.04

[default.strategies.factor]
# 팩터 관측 윈도우
lookback = 60
# 최소 체결량 (이하 틱 무시, 1주짜리 봇 주문 필터링)
min_tick_volume = 5
# 팩터 점수 임계값 (0~1, 높을수록 보수적)
buy_threshold = 0.75
sell_threshold = 0.65
# 팩터 가중치 (합계 1.0)
weight_momentum = 0.4
weight_volume = 0.3
weight_orderbook = 0.3
cooldown_seconds = 180
# 복합 팩터 — 가장 넓은 손절/익절
stop_loss_ratio = 0.015
take_profit_ratio = 0.04

[default.strategies.ichimoku]
# 전환선 기간 (봉 수)
tenkan_period = 9
# 기준선 기간 (봉 수)
kijun_period = 26
# 선행스팬B 기간 (봉 수, 구름 두께 결정)
senkou_b_period = 52
# 봉 집계 간격 (분, 1 = 1분봉 기준 일목균형표)
candle_minutes = 1
# 최소 체결량 (이하 틱 무시)
min_tick_volume = 5
cooldown_seconds = 300
# 장 초반 매수 유예 (실시간 캔들 N개 수집 전까지 BUY 차단, SELL은 허용)
open_grace_candles = 10
# 구름 대비 과열 매수 차단 (0.01 = 1%, 구름 상단 대비 이 이상 올라가면 BUY 차단)
max_cloud_distance = 0.01
# 추세 추종 — 손절만 설정, 익절은 trailing에 위임
stop_loss_ratio = 0.02

[default.strategies.volume_spike]
# 거래량 비교 기준 분봉 수 (최근 N분 평균)
baseline_window = 10
# 거래량 급증 배수 (평균 대비 N배 이상이면 폭발 판정)
spike_ratio = 3.0
# 최소 가격 상승률 (0.005 = 0.5%, 거래량 폭발 + 이 이상 상승 시 진입)
min_surge_pct = 0.005
# 최대 가격 상승률 (0.08 = 8%, 이미 너무 올라간 종목 제외)
max_surge_pct = 0.08
# 봉 집계 간격 (분)
candle_minutes = 1
cooldown_seconds = 120
# 급등 추격 — 타이트한 손절, 익절은 trailing에 위임
stop_loss_ratio = 0.015

[default.us_trading]
# 미장 자동매매 설정 (market = "us" 일 때 사용)
auto_start = false
symbols = ["AAPL", "MSFT", "NVDA"]
# 기본 거래소 (NASD/NYSE/AMEX, 스크리닝 시 3거래소 자동 통합 스캔)
exchange = "NASD"
max_position_size = 10
max_position_ratio = 0.5
max_open_positions = 3
market_close_liquidate = true
stop_loss_ratio = 0.02
take_profit_ratio = 0.05
trailing_activate_ratio = 0.015
trailing_stop_ratio = 0.005
profit_protect_activate = 0.01
profit_protect_ratio = 0.005
force_close_splits = 1
min_hold_seconds = 60
close_cooldown_seconds = 300
