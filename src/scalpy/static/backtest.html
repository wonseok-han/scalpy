<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scalpy Backtest</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
:root {
  --bg-base: #0B0E13;
  --bg-surface: #13171E;
  --bg-elevated: #1A1F2B;
  --bg-hover: #222834;
  --border: rgba(148,163,184,0.08);
  --border-hover: rgba(148,163,184,0.15);
  --text-primary: #E2E8F0;
  --text-secondary: #94A3B8;
  --text-tertiary: #64748B;
  --accent: #3B82F6;
  --accent-soft: rgba(59,130,246,0.12);
  --profit: #22C55E;
  --profit-soft: rgba(34,197,94,0.12);
  --loss: #EF4444;
  --loss-soft: rgba(239,68,68,0.12);
  --warning: #F59E0B;
  --purple: #A78BFA;
  --purple-soft: rgba(139,92,246,0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --font: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg-base);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 3px; }

.container { max-width: 1200px; margin: 0 auto; padding: 0 24px 40px; }

.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(11,14,19,0.82);
  backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px; margin-bottom: 24px;
}
.header-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center;
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #8B5CF6, #EC4899);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.85rem; color: #fff;
}
.brand h1 { font-size: 1.1rem; font-weight: 700; }
.brand-sub { font-size: 0.75rem; color: var(--text-tertiary); }
.nav-links { display: flex; gap: 8px; }
.nav-link {
  padding: 8px 16px; border-radius: var(--radius-sm);
  font-size: 0.8rem; font-weight: 500; color: var(--text-secondary);
  text-decoration: none; transition: all 0.2s;
  border: 1px solid var(--border);
}
.nav-link:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-link.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

.section-title {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text-tertiary);
  margin: 28px 0 12px; padding-left: 4px;
}
.section-title:first-of-type { margin-top: 0; }

.card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 16px;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--border-hover); }
.card-header {
  padding: 16px 22px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.card-title { font-size: 0.85rem; font-weight: 600; }
.card-badge {
  font-size: 0.7rem; font-weight: 500; padding: 3px 8px;
  border-radius: 6px; background: var(--bg-hover); color: var(--text-tertiary);
}
.card-body { padding: 16px 22px; }

.form-row {
  display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
}
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 0.72rem; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 12px;
  color: var(--text-primary); font-family: var(--font); font-size: 0.82rem;
  transition: border-color 0.2s; outline: none; width: 130px;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-tertiary); }
.form-input.wide { width: 180px; }

.btn {
  padding: 9px 16px; border: 1px solid var(--border-hover);
  border-radius: var(--radius-sm); background: var(--bg-elevated);
  color: var(--text-secondary); cursor: pointer; font-family: var(--font);
  font-size: 0.8rem; font-weight: 500; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
}
.btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.btn-primary:hover { background: #2563EB; }
.btn-secondary { border-color: rgba(139,92,246,0.3); color: var(--purple); }
.btn-secondary:hover { background: var(--purple-soft); }
.btn-optimize { background: linear-gradient(135deg, #8B5CF6, #EC4899); border: none; color: #fff; font-weight: 600; }
.btn-optimize:hover { filter: brightness(1.1); }
.btn-sm { padding: 6px 12px; font-size: 0.75rem; }

.stock-chips {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
  max-height: 280px; overflow-y: auto;
}
.stock-chip {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 5px 10px;
  font-size: 0.75rem; cursor: pointer; transition: all 0.2s; user-select: none;
  min-width: 130px;
}
.stock-chip:hover { border-color: var(--accent); }
.stock-chip.selected { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.stock-chip .chip-name { font-weight: 600; }
.stock-chip .chip-code { font-size: 0.65rem; color: var(--text-tertiary); margin-left: 3px; }
.stock-chip .chip-vol { display: block; font-size: 0.62rem; color: var(--text-tertiary); margin-top: 1px; }

.actions-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
.status-msg { font-size: 0.8rem; color: var(--text-tertiary); margin-left: 4px; }

.form-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}

.result-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
}
.result-card {
  background: var(--bg-elevated); border-radius: var(--radius-md); padding: 14px;
}
.result-label { font-size: 0.7rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.result-value { font-size: 1.2rem; font-weight: 700; font-variant-numeric: tabular-nums; }
.result-sub { font-size: 0.7rem; color: var(--text-tertiary); margin-top: 2px; }

table {
  width: 100%; border-collapse: collapse; font-size: 0.8rem;
  font-variant-numeric: tabular-nums;
}
thead th {
  text-align: left; color: var(--text-tertiary); font-weight: 500;
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 9px 14px; background: var(--bg-elevated);
  border-bottom: 1px solid var(--border); position: sticky; top: 0;
}
tbody td {
  padding: 9px 14px; border-bottom: 1px solid var(--border);
  color: var(--text-primary);
}
tbody tr:hover { background: rgba(148,163,184,0.03); }
tbody tr:last-child td { border-bottom: none; }
.text-right { text-align: right; }
.text-center { text-align: center; }
.text-profit { color: var(--profit); }
.text-loss { color: var(--loss); }
.pnl-chip { display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 0.75rem; font-weight: 600; }
.pnl-chip.up { background: var(--profit-soft); color: var(--profit); }
.pnl-chip.down { background: var(--loss-soft); color: var(--loss); }
.pnl-chip.neutral { background: var(--bg-hover); color: var(--text-secondary); }

.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%; font-size: 0.65rem; font-weight: 700;
  background: var(--bg-hover); color: var(--text-tertiary); flex-shrink: 0;
}
.rank-badge.top { background: var(--purple-soft); color: var(--purple); }

.progress-bar {
  height: 6px; background: var(--bg-hover); border-radius: 3px;
  margin-top: 10px; overflow: hidden; display: none;
}
.progress-bar.active { display: block; }
.progress-bar .bar {
  height: 100%; background: linear-gradient(90deg, var(--accent), #8B5CF6);
  border-radius: 3px; transition: width 0.5s ease;
  min-width: 2%;
}
.progress-bar .bar.indeterminate { animation: progress 1.5s ease-in-out infinite; }
@keyframes progress { 0%{width:15%;margin-left:0} 50%{width:40%;margin-left:30%} 100%{width:15%;margin-left:85%} }

.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  padding: 12px 28px; border-radius: var(--radius-sm); font-size: 0.82rem;
  font-weight: 500; color: #fff; z-index: 9999;
  animation: toastIn 0.35s cubic-bezier(0.16,1,0.3,1);
}
.toast-success { background: rgba(34,197,94,0.92); }
.toast-error { background: rgba(239,68,68,0.92); }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(12px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}


.scroll-area { max-height: 400px; overflow-y: auto; }

.divider {
  height: 1px; background: var(--border); margin: 6px 0 20px;
}

#result-section, #optimize-result { display: none; }


@media (max-width: 768px) {
  .result-grid { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-logo">B</div>
      <div>
        <h1>Scalpy Backtest</h1>
        <span class="brand-sub">Historical Replay Engine</span>
      </div>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link">Live Trading</a>
      <a href="/backtest" class="nav-link active">Backtest</a>
    </div>
  </div>
</div>

<div class="container">

  <!-- ═══════════════════════════════════════════ -->
  <!-- SECTION 1: 데이터 수집                      -->
  <!-- ═══════════════════════════════════════════ -->
  <div class="section-title">데이터 수집</div>

  <!-- Screening + Fetch -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">종목 스크리닝</span>
      <span class="card-badge" id="selected-badge">0종목</span>
    </div>
    <div class="card-body">
      <div class="actions-row" style="margin-top:0">
        <button class="btn btn-secondary" onclick="doScreen()" id="btn-screen">급등+거래량 TOP 50</button>
        <button class="btn btn-sm" onclick="selectTop(10)">상위 10</button>
        <button class="btn btn-sm" onclick="selectTop(20)">상위 20</button>
        <button class="btn btn-sm" onclick="selectAll()">전체</button>
        <button class="btn btn-sm" onclick="selectNone()">해제</button>
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
          <input type="text" class="form-input" id="manual-symbols" placeholder="005930,000660" style="width:160px">
          <button class="btn btn-sm" onclick="addManual()">추가</button>
        </div>
      </div>
      <div id="stock-chips" class="stock-chips">
        <span style="color:var(--text-tertiary);font-size:0.8rem">스크리닝 버튼을 눌러 종목을 불러오세요</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">분봉 데이터 수집</span>
    </div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">수집 일수</label>
          <input type="number" class="form-input" id="fetch-days" value="1" min="1" max="10">
        </div>
        <button class="btn btn-primary" onclick="doFetch()" id="btn-fetch" style="align-self:flex-end">선택 종목 수집</button>
        <span class="status-msg" id="fetch-status"></span>
      </div>
      <div class="progress-bar" id="fetch-progress"><div class="bar indeterminate"></div></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SECTION 2: 백테스트                         -->
  <!-- ═══════════════════════════════════════════ -->
  <div class="section-title">백테스트</div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">저장된 종목</span>
      <span class="card-badge" id="db-badge">-</span>
    </div>
    <div class="card-body">
      <div class="actions-row" style="margin-top:0">
        <button class="btn btn-sm" onclick="selectAllDb()">전체</button>
        <button class="btn btn-sm" onclick="selectNoneDb()">해제</button>
        <button class="btn btn-sm" onclick="loadDbInfo()">새로고침</button>
      </div>
      <input type="text" id="db-search" placeholder="종목명/코드 검색 (쉼표 구분 코드 붙여넣기 가능)" oninput="onDbSearch()" style="width:100%;margin-top:8px;padding:7px 10px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:0.82rem;outline:none">
      <div id="db-info" class="stock-chips" style="margin-top:10px">
        <span style="color:var(--text-tertiary);font-size:0.8rem">로딩 중...</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">파라미터 설정</span>
      <span class="card-badge" id="bt-selected-badge">0종목 선택됨</span>
    </div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">초기 자금</label>
          <input type="number" class="form-input" id="balance" value="500000" step="100000">
        </div>
        <div class="form-group">
          <label class="form-label">손절 비율</label>
          <input type="number" class="form-input" id="stop-loss" value="0.005" step="0.001" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">익절 비율</label>
          <input type="number" class="form-input" id="take-profit" value="0.01" step="0.001" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">종목당 최대 수량</label>
          <input type="number" class="form-input" id="max-qty" value="100" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">최대 포지션 수</label>
          <input type="number" class="form-input" id="max-positions" value="3" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">백테스트 날짜 (필수)</label>
          <input type="date" class="form-input" id="bt-date" required>
        </div>
      </div>
      <div style="margin-top:14px">
        <label class="form-label">전략 선택</label>
        <div id="strategy-chips" class="stock-chips" style="margin-top:6px">
          <span style="color:var(--text-tertiary);font-size:0.8rem">로딩 중...</span>
        </div>
      </div>
      <div class="actions-row">
        <button class="btn btn-primary" onclick="doRun()" id="btn-run">백테스트 실행</button>
        <button class="btn btn-optimize" onclick="doOptimize()" id="btn-optimize">최적 파라미터 탐색</button>
        <span class="status-msg" id="bt-status"></span>
      </div>
      <div class="progress-bar" id="bt-progress"><div class="bar indeterminate"></div></div>
    </div>
  </div>

  <!-- Single Result -->
  <div id="result-section">
    <div class="card">
      <div class="card-header">
        <span class="card-title">백테스트 결과</span>
        <span class="card-badge" id="result-period">-</span>
      </div>
      <div class="card-body">
        <div class="result-grid" id="result-metrics"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">거래 요약</span>
        <span class="card-badge" id="result-trade-count">-</span>
      </div>
      <div class="card-body" style="padding:0">
        <div class="result-grid" style="padding:14px 22px" id="trade-metrics"></div>
      </div>
    </div>
  </div>

  <!-- Optimization Result -->
  <div id="optimize-result">
    <div class="card">
      <div class="card-header">
        <span class="card-title">최적화 결과</span>
        <span class="card-badge" id="opt-badge">-</span>
      </div>
      <div class="card-body" style="padding:0">
        <div class="scroll-area">
          <table>
            <thead>
              <tr>
                <th class="text-center">#</th>
                <th class="text-right">손절</th>
                <th class="text-right">익절</th>
                <th class="text-right">포지션</th>
                <th>전략 파라미터</th>
                <th class="text-right">손익</th>
                <th class="text-right">수익률</th>
                <th class="text-right">승률</th>
                <th class="text-right">거래수</th>
                <th class="text-right">수수료</th>
              </tr>
            </thead>
            <tbody id="opt-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const fmt = n => Number(n).toLocaleString('ko-KR');
const pnlSign = v => { const n = Number(v); return n > 0 ? '+' + fmt(n) : n < 0 ? fmt(n) : '0'; };
const pctStr = v => (v >= 0 ? '+' : '') + v + '%';

let _stocks = [];
let _selected = new Set();

let _dbStocks = [];
let _dbSelected = new Set();

let _strategies = [];
let _stratEnabled = new Set();

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function setFetchStatus(msg) { document.getElementById('fetch-status').textContent = msg; }
function setBtStatus(msg) { document.getElementById('bt-status').textContent = msg; }

function setProgress(id, active, determinate) {
  const el = document.getElementById(id);
  const bar = el.querySelector('.bar');
  el.className = active ? 'progress-bar active' : 'progress-bar';
  if (determinate !== undefined) {
    bar.className = 'bar';
    bar.style.width = determinate + '%';
  } else {
    bar.className = 'bar indeterminate';
    bar.style.width = '';
  }
}

function setFetchButtons(disabled) {
  document.getElementById('btn-fetch').disabled = disabled;
  document.getElementById('btn-screen').disabled = disabled;
}
function setBtButtons(disabled) {
  document.getElementById('btn-run').disabled = disabled;
  document.getElementById('btn-optimize').disabled = disabled;
}

function renderChips() {
  const el = document.getElementById('stock-chips');
  document.getElementById('selected-badge').textContent = _selected.size + '/' + _stocks.length + '종목';
  if (!_stocks.length) {
    el.innerHTML = '<span style="color:var(--text-tertiary);font-size:0.8rem">스크리닝 버튼을 눌러 종목을 불러오세요</span>';
    return;
  }
  el.innerHTML = _stocks.map((s, i) => {
    const sel = _selected.has(s.symbol) ? ' selected' : '';
    const vol = s.volume ? fmt(s.volume) : '';
    const rate = s.change_rate !== undefined ? s.change_rate : 0;
    const rateColor = rate > 0 ? 'var(--profit)' : rate < 0 ? 'var(--loss)' : 'var(--text-tertiary)';
    const rateStr = rate !== 0 ? `<span style="color:${rateColor};font-weight:600"> ${rate >= 0 ? '+' : ''}${rate}%</span>` : '';
    return `<span class="stock-chip${sel}" onclick="toggleStock('${s.symbol}')">
      <span style="font-size:0.62rem;color:var(--text-tertiary);margin-right:3px">${i+1}</span><span class="chip-name">${s.name || s.symbol}</span><span class="chip-code">${s.symbol}</span>
      ${vol ? `<span class="chip-vol">${vol}${rateStr}</span>` : ''}
    </span>`;
  }).join('');
  updateBtSummary();
}

function updateBtBadge() {
  const filtered = getFilteredDbStocks();
  document.getElementById('bt-selected-badge').textContent = _dbSelected.size + '/' + filtered.length + '종목';
}

function getBtSelectedSymbols() { return [..._dbSelected]; }

function toggleDbStock(sym) {
  if (_dbSelected.has(sym)) _dbSelected.delete(sym);
  else _dbSelected.add(sym);
  renderDbChips();
}
function selectAllDb() { _dbStocks.forEach(s => _dbSelected.add(s.symbol)); renderDbChips(); }
function selectNoneDb() { _dbSelected.clear(); renderDbChips(); }

function getFilteredDbStocks() {
  const q = (document.getElementById('db-search')?.value || '').trim();
  if (!q) return _dbStocks;
  const codes = q.includes(',') ? q.split(',').map(c => c.trim()).filter(Boolean) : null;
  if (codes) return _dbStocks.filter(s => codes.includes(s.symbol));
  const lq = q.toLowerCase();
  return _dbStocks.filter(s => s.name.toLowerCase().includes(lq) || s.symbol.includes(q));
}


function onDbSearch() {
  const q = (document.getElementById('db-search')?.value || '').trim();
  const filtered = getFilteredDbStocks();
  _dbSelected = q ? new Set(filtered.map(s => s.symbol)) : new Set(_dbStocks.map(s => s.symbol));
  renderDbChips();
}

function renderDbChips() {
  const el = document.getElementById('db-info');
  const filtered = getFilteredDbStocks();
  updateBtBadge();
  if (!_dbStocks.length) {
    el.innerHTML = '<span style="color:var(--text-tertiary);font-size:0.8rem">저장된 데이터 없음 — 위에서 종목을 수집하세요</span>';
    return;
  }
  if (!filtered.length) {
    el.innerHTML = '<span style="color:var(--text-tertiary);font-size:0.8rem">검색 결과 없음</span>';
    return;
  }
  el.innerHTML = filtered.map(s => {
    const sel = _dbSelected.has(s.symbol) ? ' selected' : '';
    return `<span class="stock-chip${sel}" onclick="toggleDbStock('${s.symbol}')">
      <span class="chip-name">${s.name}</span><span class="chip-code">${s.symbol}</span>
      <span class="chip-vol">${fmt(s.count)}건 | ${s.min_dt.slice(0,10)} ~ ${s.max_dt.slice(0,10)}</span>
    </span>`;
  }).join('');
}

function toggleStock(sym) {
  if (_selected.has(sym)) _selected.delete(sym);
  else _selected.add(sym);
  renderChips();
}

function selectAll() { _stocks.forEach(s => _selected.add(s.symbol)); renderChips(); }
function selectNone() { _selected.clear(); renderChips(); }
function selectTop(n) {
  _selected.clear();
  _stocks.slice(0, n).forEach(s => _selected.add(s.symbol));
  renderChips();
}

function addManual() {
  const input = document.getElementById('manual-symbols').value.trim();
  if (!input) return;
  input.split(',').map(s => s.trim()).filter(s => s.length === 6).forEach(sym => {
    if (!_stocks.find(s => s.symbol === sym)) _stocks.push({ symbol: sym, name: sym });
    _selected.add(sym);
  });
  document.getElementById('manual-symbols').value = '';
  renderChips();
}

function getSelectedSymbols() { return [..._selected]; }

async function doScreen() {
  setFetchButtons(true);
  setFetchStatus('스크리닝 중...');
  try {
    const balance = parseInt(document.getElementById('balance').value) || 500000;
    const r = await fetch(`/api/backtest/screen?count=50&max_price=${balance}`);
    const d = await r.json();
    _stocks = d.stocks || [];
    _selected = new Set(_stocks.map(s => s.symbol));
    renderChips();
    setFetchStatus(`${_stocks.length}종목 전체 선택`);
    toast(_stocks.length + '종목 스크리닝 완료', 'success');
  } catch (e) {
    setFetchStatus('스크리닝 실패');
    toast('스크리닝 실패: ' + e.message, 'error');
  } finally {
    setFetchButtons(false);
  }
}

async function doFetch() {
  const syms = getSelectedSymbols();
  if (!syms.length) { toast('종목을 선택하세요', 'error'); return; }
  const days = parseInt(document.getElementById('fetch-days').value) || 1;

  setFetchButtons(true);
  setProgress('fetch-progress', true);
  setFetchStatus(`${syms.length}종목 x ${days}일 수집 중...`);

  try {
    const r = await fetch('/api/backtest/fetch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbols: syms, days }),
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    setFetchStatus(`${fmt(d.total)}건 수집 완료`);
    toast(fmt(d.total) + '건 저장 완료', 'success');
    loadDbInfo();
  } catch (e) {
    setFetchStatus('수집 실패');
    toast('수집 실패: ' + e.message, 'error');
  } finally {
    setFetchButtons(false);
    setProgress('fetch-progress', false);
  }
}

async function doRun() {
  const syms = getBtSelectedSymbols();
  if (!syms.length) { toast('백테스트할 종목을 선택하세요', 'error'); return; }

  const dt = document.getElementById('bt-date').value;
  if (!dt) { toast('백테스트 날짜를 선택하세요', 'error'); return; }
  const strats = getEnabledStrategies();
  if (!strats.length) { toast('전략을 1개 이상 선택하세요', 'error'); return; }

  const params = {
    symbols: syms,
    strategies: strats,
    balance: parseInt(document.getElementById('balance').value) || 500000,
    stop_loss: parseFloat(document.getElementById('stop-loss').value) || 0.005,
    take_profit: parseFloat(document.getElementById('take-profit').value) || 0.01,
    max_qty: parseInt(document.getElementById('max-qty').value) || 100,
    max_positions: parseInt(document.getElementById('max-positions').value) || 3,
    date: dt,
  };

  setBtButtons(true);
  setProgress('bt-progress', true);
  setBtStatus('백테스트 실행 중...');
  document.getElementById('optimize-result').style.display = 'none';

  try {
    const r = await fetch('/api/backtest/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params),
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    showResult(d);
    setBtStatus('완료');
    toast('백테스트 완료', 'success');
  } catch (e) {
    setBtStatus('실행 실패');
    toast('실패: ' + e.message, 'error');
  } finally {
    setBtButtons(false);
    setProgress('bt-progress', false);
  }
}

async function doOptimize() {
  const syms = getBtSelectedSymbols();
  if (!syms.length) { toast('백테스트할 종목을 선택하세요', 'error'); return; }
  const dt = document.getElementById('bt-date').value;
  if (!dt) { toast('백테스트 날짜를 선택하세요', 'error'); return; }
  const strats = getEnabledStrategies();
  if (!strats.length) { toast('전략을 1개 이상 선택하세요', 'error'); return; }

  const params = {
    symbols: syms,
    strategies: strats,
    balance: parseInt(document.getElementById('balance').value) || 500000,
    max_qty: parseInt(document.getElementById('max-qty').value) || 100,
    date: dt,
  };

  setBtButtons(true);
  setProgress('bt-progress', true);
  setBtStatus('최적 파라미터 탐색 중...');
  document.getElementById('result-section').style.display = 'none';

  const pollId = setInterval(async () => {
    try {
      const pr = await fetch('/api/backtest/progress');
      const pg = await pr.json();
      if (pg.status === 'optimizing' && pg.total > 0) {
        const pct = Math.round(pg.current / pg.total * 100);
        setProgress('bt-progress', true, pct);
        setBtStatus(`탐색 중... ${pg.current}/${pg.total} (${pct}%)`);
      } else if (pg.status === 'done') {
        clearInterval(pollId);
        setBtButtons(false);
        setProgress('bt-progress', false);
        if (pg.results) {
          showOptimizeResult({ results: pg.results, total_combos: pg.total, tested: pg.results.length });
          setBtStatus(`완료 — ${pg.results.length}개 조합`);
          toast(`${pg.results.length}개 조합 탐색 완료`, 'success');
        }
      } else if (pg.status === 'error') {
        clearInterval(pollId);
        setBtButtons(false);
        setProgress('bt-progress', false);
        setBtStatus('탐색 실패');
        toast('실패: ' + (pg.error || ''), 'error');
      }
    } catch {}
  }, 3000);

  try {
    const r = await fetch('/api/backtest/optimize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params),
    });
    const d = await r.json();
    if (d.error) {
      clearInterval(pollId);
      setBtButtons(false);
      setProgress('bt-progress', false);
      setBtStatus('탐색 실패');
      toast('실패: ' + d.error, 'error');
    }
  } catch (e) {
    clearInterval(pollId);
    setBtButtons(false);
    setProgress('bt-progress', false);
    setBtStatus('탐색 실패');
    toast('실패: ' + e.message, 'error');
  }
}

function showResult(r) {
  document.getElementById('result-section').style.display = 'block';
  document.getElementById('result-period').textContent = r.period;
  document.getElementById('result-trade-count').textContent = r.total_trades + '건';

  const pnl = r.pnl;
  const pnlCls = pnl >= 0 ? 'text-profit' : 'text-loss';

  document.getElementById('result-metrics').innerHTML = `
    <div class="result-card">
      <div class="result-label">초기 자금</div>
      <div class="result-value">${fmt(r.initial_balance)}원</div>
    </div>
    <div class="result-card">
      <div class="result-label">최종 평가</div>
      <div class="result-value">${fmt(r.total_value)}원</div>
      <div class="result-sub">현금 ${fmt(r.final_balance)} + 보유 ${fmt(r.position_value)}</div>
    </div>
    <div class="result-card">
      <div class="result-label">손익</div>
      <div class="result-value ${pnlCls}">${pnlSign(pnl)}원</div>
      <div class="result-sub ${pnlCls}">${pctStr(r.pnl_pct)}</div>
    </div>
    <div class="result-card">
      <div class="result-label">수수료 합계</div>
      <div class="result-value">${fmt(r.total_fees)}원</div>
      <div class="result-sub">분봉 ${fmt(r.candles)}개</div>
    </div>
  `;

  const winCls = r.win_rate >= 50 ? 'text-profit' : 'text-loss';
  document.getElementById('trade-metrics').innerHTML = `
    <div class="result-card">
      <div class="result-label">총 거래</div>
      <div class="result-value">${r.total_trades}건</div>
      <div class="result-sub">매수 ${r.buy_count} / 매도 ${r.sell_count}</div>
    </div>
    <div class="result-card">
      <div class="result-label">승률</div>
      <div class="result-value ${winCls}">${r.win_rate}%</div>
      <div class="result-sub">${r.wins}승 ${r.losses}패</div>
    </div>
    <div class="result-card">
      <div class="result-label">미청산</div>
      <div class="result-value">${r.open_positions}건</div>
    </div>
    <div class="result-card">
      <div class="result-label">활성 전략</div>
      <div class="result-value" style="font-size:0.85rem">${(r.strategies || []).join(', ') || '-'}</div>
    </div>
  `;

  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function fmtStratParams(strategies) {
  if (!strategies || !Object.keys(strategies).length) return '-';
  return Object.entries(strategies).map(([name, params]) => {
    const pStr = Object.entries(params).map(([k,v]) => `${k}=${v}`).join(' ');
    return `<div style="font-size:0.68rem;color:var(--text-secondary)"><b>${name}</b> ${pStr}</div>`;
  }).join('');
}

function showOptimizeResult(d) {
  const results = d.results || [];
  document.getElementById('optimize-result').style.display = 'block';
  document.getElementById('opt-badge').textContent = `${d.tested}개 조합 / 상위 ${Math.min(results.length, 30)}`;

  const top = results.slice(0, 30);
  document.getElementById('opt-table').innerHTML = top.length ? top.map((r, i) => {
    const pnl = r.pnl;
    const cls = pnl >= 0 ? 'up' : 'down';
    const rankCls = i < 3 ? ' top' : '';
    return `<tr style="cursor:pointer" onclick="applyParams(${r.stop_loss},${r.take_profit},${r.max_positions})">
      <td class="text-center"><span class="rank-badge${rankCls}">${i + 1}</span></td>
      <td class="text-right">${(r.stop_loss * 100).toFixed(1)}%</td>
      <td class="text-right">${(r.take_profit * 100).toFixed(1)}%</td>
      <td class="text-right">${r.max_positions}</td>
      <td style="max-width:200px">${fmtStratParams(r.strategies)}</td>
      <td class="text-right"><span class="pnl-chip ${cls}">${pnlSign(pnl)}</span></td>
      <td class="text-right ${pnl >= 0 ? 'text-profit' : 'text-loss'}">${pctStr(r.pnl_pct)}</td>
      <td class="text-right">${r.win_rate}%</td>
      <td class="text-right">${r.total_trades}</td>
      <td class="text-right">${fmt(r.total_fees)}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="10" style="text-align:center;padding:20px;color:var(--text-tertiary)">수익 나는 조합 없음</td></tr>';

  document.getElementById('optimize-result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function applyParams(sl, tp, mp) {
  document.getElementById('stop-loss').value = sl;
  document.getElementById('take-profit').value = tp;
  document.getElementById('max-positions').value = mp;
  toast(`손절 ${(sl*100).toFixed(1)}% / 익절 ${(tp*100).toFixed(1)}% / 포지션 ${mp} 적용`, 'success');
}

async function loadDbInfo() {
  try {
    const r = await fetch('/api/backtest/info');
    const d = await r.json();
    const rows = d.rows || [];
    _dbStocks = rows.map(r => ({
      symbol: r.symbol,
      name: r.name || r.symbol,
      count: r.count,
      min_dt: r.min_dt,
      max_dt: r.max_dt,
    })).sort((a, b) => a.name.localeCompare(b.name, 'ko'));
    _dbSelected = new Set(_dbStocks.map(s => s.symbol));
    renderDbChips();
  } catch {
    document.getElementById('db-info').innerHTML = '<span style="color:var(--text-tertiary);font-size:0.8rem">DB 연결 실패</span>';
  }
}

async function loadStrategies() {
  try {
    const r = await fetch('/api/backtest/strategies');
    const d = await r.json();
    _strategies = d.strategies || [];
    _stratEnabled = new Set(_strategies.map(s => s.name));
    renderStrategyChips();
  } catch {
    document.getElementById('strategy-chips').innerHTML = '<span style="color:var(--text-tertiary);font-size:0.8rem">전략 로딩 실패</span>';
  }
}

function toggleStrategy(name) {
  if (_stratEnabled.has(name)) _stratEnabled.delete(name);
  else _stratEnabled.add(name);
  renderStrategyChips();
}

function renderStrategyChips() {
  const el = document.getElementById('strategy-chips');
  el.innerHTML = _strategies.map(s => {
    const sel = _stratEnabled.has(s.name) ? ' selected' : '';
    const paramStr = Object.entries(s.params).map(([k,v]) => `${k}=${v}`).join(', ');
    return `<span class="stock-chip${sel}" onclick="toggleStrategy('${s.name}')" style="min-width:auto">
      <span class="chip-name">${s.display_name}</span>
      <span class="chip-vol">${paramStr}</span>
    </span>`;
  }).join('');
}

function getEnabledStrategies() { return [..._stratEnabled]; }

document.getElementById('bt-date').value = new Date().toISOString().slice(0, 10);

loadDbInfo();
loadStrategies();
resumeIfRunning();

async function resumeIfRunning() {
  try {
    const r = await fetch('/api/backtest/progress');
    const pg = await r.json();
    if (pg.status === 'optimizing') {
      setBtButtons(true);
      setProgress('bt-progress', true);
      setBtStatus(`탐색 재연결... ${pg.current || 0}/${pg.total || '?'}`);
      const pollId = setInterval(async () => {
        try {
          const pr = await fetch('/api/backtest/progress');
          const p = await pr.json();
          if (p.status === 'optimizing' && p.total > 0) {
            const pct = Math.round(p.current / p.total * 100);
            setProgress('bt-progress', true, pct);
            setBtStatus(`탐색 중... ${p.current}/${p.total} (${pct}%)`);
          } else if (p.status === 'done') {
            clearInterval(pollId);
            setBtButtons(false);
            setProgress('bt-progress', false);
            if (p.results) {
              showOptimizeResult({ results: p.results, total_combos: p.total, tested: p.results.length });
              setBtStatus(`완료 — ${p.results.length}개 조합`);
              toast('최적화 완료', 'success');
            }
          } else if (p.status === 'error') {
            clearInterval(pollId);
            setBtButtons(false);
            setProgress('bt-progress', false);
            setBtStatus('탐색 실패');
            toast('실패: ' + (p.error || ''), 'error');
          }
        } catch {}
      }, 5000);
    } else if (pg.status === 'done' && pg.results && pg.results.length) {
      showOptimizeResult({ results: pg.results, total_combos: pg.total, tested: pg.results.length });
      setBtStatus(`이전 탐색 결과 — ${pg.results.length}개 조합`);
    }
  } catch {}
}
</script>
