name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'Release v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from PR title
        id: version
        run: |
          VERSION=$(echo "${{ github.event.pull_request.title }}" | grep -oP 'v\d+\.\d+\.\d+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read changelog
        id: changelog
        run: |
          FILE="changelogs/${{ steps.version.outputs.version }}.md"
          if [ -f "$FILE" ]; then
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            cat "$FILE" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "body=Release ${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
